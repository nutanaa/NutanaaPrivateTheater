# ========================================
# NUTANAA PRIVATE THEATER BOOKING PLATFORM
# Application Configuration Properties
# ========================================

# Application Information
spring.application.name=Nutanaa Private Theater Booking Platform
server.port=8080
server.servlet.context-path=/

# ========================================
# DATABASE CONFIGURATION
# ========================================
# Primary Database: MySQL (you can switch to PostgreSQL by commenting MySQL and uncommenting PostgreSQL)

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/nutanaa_theater_booking?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# PostgreSQL Configuration (Alternative - uncomment to use PostgreSQL)
#spring.datasource.url=jdbc:postgresql://localhost:5432/nutanaa_theater_booking
#spring.datasource.username=postgres
#spring.datasource.password=postgres
#spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# Database Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ========================================
# SECURITY CONFIGURATION
# ========================================
# JWT Secret Key for Token Generation
jwt.secret=NutanaaPrivateTheaterBookingSecretKey2024VerySecureAndLongKey
jwt.expiration=86400000

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# ========================================
# FILE UPLOAD CONFIGURATION
# ========================================
# Maximum file size for KYC document uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# File storage path for KYC documents
file.upload.kyc-documents-path=uploads/kyc-documents/
file.upload.profile-pictures-path=uploads/profile-pictures/
file.upload.theater-images-path=uploads/theater-images/

# ========================================
# EMAIL CONFIGURATION
# ========================================
# Gmail SMTP Configuration for sending booking confirmations
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ========================================
# SMS CONFIGURATION (TWILIO)
# ========================================
# Twilio credentials for OTP and booking confirmations
twilio.account.sid=your-twilio-account-sid
twilio.auth.token=your-twilio-auth-token
twilio.phone.number=+1234567890

# ========================================
# WHATSAPP CONFIGURATION
# ========================================
# WhatsApp Business API configuration
whatsapp.api.url=https://graph.facebook.com/v18.0/your-phone-number-id/messages
whatsapp.access.token=your-whatsapp-access-token

# ========================================
# AI CHATBOT CONFIGURATION
# ========================================
# OpenAI GPT Configuration
openai.api.key=your-openai-api-key
openai.api.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-3.5-turbo

# Dialogflow Configuration (Alternative)
dialogflow.project.id=your-dialogflow-project-id
dialogflow.language.code=en

# ========================================
# LOGGING CONFIGURATION
# ========================================
# Logging levels and file configuration
logging.level.com.nutanaa.privatetheaterbooking=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/nutanaa-theater-booking.log

# ========================================
# ACTUATOR CONFIGURATION
# ========================================
# Health check and monitoring endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

# ========================================
# STATIC RESOURCES CONFIGURATION
# ========================================
# Static content serving (CSS, JS, Images)
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=3600

# ========================================
# THYMELEAF CONFIGURATION
# ========================================
# Template engine configuration for dynamic pages
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ========================================
# CUSTOM APPLICATION PROPERTIES
# ========================================
# Business Logic Configuration
app.booking.advance-booking-days=30
app.booking.cancellation-hours=24
app.theater.max-seats=50
app.theater.min-seats=1

# OTP Configuration
app.otp.expiry-minutes=5
app.otp.length=6

# Payment Configuration
app.payment.gateway.url=https://payment-gateway-url.com
app.payment.gateway.key=your-payment-gateway-key

# Revenue Analytics
app.analytics.enable=true
app.analytics.cache-duration=3600

# Admin Configuration
app.admin.default.username=admin
app.admin.default.password=Admin@123
app.admin.default.email=admin@nutanaa.com

# Manager Configuration
app.manager.booking-view-days=2

# ========================================
# DEVELOPMENT CONFIGURATION
# ========================================
# Development mode settings
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Error handling
server.error.whitelabel.enabled=false
server.error.path=/error